name: Daily Specsavers Monitor

on:
  schedule:
    - cron: '0 3 * * 1-5'  # 3am UTC = 4am BST (summer) / 3am GMT (winter)
  workflow_dispatch:           # lets you trigger manually from GitHub UI

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Send digest email
        env:
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
          MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
          ROB_EMAIL: ${{ secrets.ROB_EMAIL }}
        run: python send_digest.py

      - name: Save updated seen_jobs.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add seen_jobs.json new_jobs_today.json
          git diff --staged --quiet || git commit -m "Daily update $(date +%Y-%m-%d)"
          git push
